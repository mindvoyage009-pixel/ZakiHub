<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | ZakiHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --green: #00ff88;
      --cyan: #00ccff;
      --pink: #ff6b9d;
      --gold: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: #e0e0ff;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 1.5rem;
      transition: all 0.2s;
    }
    .card:hover {
      border-color: var(--green);
      transform: translateY(-3px);
    }
    .card-label {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 0.5rem;
    }
    .card-value {
      font-size: 2rem;
      font-weight: 800;
    }
    .card-value.green { color: var(--green); }
    .card-value.cyan { color: var(--cyan); }
    .card-value.pink { color: var(--pink); }
    .card-value.gold { color: var(--gold); }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      color: inherit;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: var(--green);
      color: var(--bg);
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, var(--green), var(--cyan));
    }
  </style>
  <!-- [AD-1] POPUNDER -->

</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">← العودة للرئيسية</a>
    <h1>📊 لوحة التحكم</h1>
    
    <!-- [AD-5] BANNER 300x250 -->
    <div class="ad-container" style="margin: 20px auto; max-width: 300px;">
        <script type="text/javascript">
            atOptions = {
                'key' : 'e68c05c95fb7752495fe2cf1a9dfdcd6',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/e68c05c95fb7752495fe2cf1a9dfdcd6/invoke.js"></script>
    </div>

    <div class="grid" id="stats-grid">
      <div class="card">
        <div class="card-label">النقاط الكلية</div>
        <div class="card-value gold" id="stat-points">0</div>
      </div>
      <div class="card">
        <div class="card-label">المستوى الحالي</div>
        <div class="card-value green" id="stat-level">1</div>
      </div>
      <div class="card">
        <div class="card-label">سلسلة الأيام</div>
        <div class="card-value cyan" id="stat-streak">0</div>
      </div>
      <div class="card">
        <div class="card-label">الأدوات المكتشفة</div>
        <div class="card-value pink" id="stat-tools">0</div>
      </div>
    </div>
  </div>

  <script>
    function loadStats() {
      const dopamine = JSON.parse(localStorage.getItem('zaki-dopamine') || '{}');
      
      document.getElementById('stat-points').textContent = (dopamine.points || 0).toLocaleString();
      document.getElementById('stat-level').textContent = dopamine.level || 1;
      document.getElementById('stat-streak').textContent = dopamine.streak || 0;
      document.getElementById('stat-tools').textContent = (dopamine.toolsDiscovered || []).length;
    }
    
    loadStats();
  </script>

</body>
</html>
