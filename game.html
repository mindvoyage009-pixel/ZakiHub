<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة Zaki's Tool Run 🎮 | لعبة استكشاف أدوات الذكاء الاصطناعي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --green: #00ff88;
      --pink: #ff6b9d;
      --cyan: #00ccff;
      --gold: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: #e0e0ff;
      overflow: hidden;
      height: 100vh;
    }
    
    #game-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    
    .game-hud {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    
    .hud-item {
      background: rgba(10,10,30,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      pointer-events: all;
    }
    
    .hud-score { color: var(--gold); }
    .hud-level { color: var(--green); }
    .hud-tools { color: var(--cyan); }
    
    .player {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 3rem;
      transition: left 0.1s ease;
      filter: drop-shadow(0 0 10px var(--green));
      cursor: pointer;
    }
    
    .player.jumping {
      animation: jump 0.5s ease;
    }
    
    @keyframes jump {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-100px); }
    }
    
    .start-screen {
      position: fixed;
      inset: 0;
      background: rgba(5,5,16,0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    
    .start-screen h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 3rem;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .start-btn {
      padding: 1rem 3rem;
      font-size: 1.3rem;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: var(--bg);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .start-btn:hover {
      transform: scale(1.1);
    }
    
    .game-instructions {
      text-align: center;
      opacity: 0.7;
      max-width: 400px;
      line-height: 1.8;
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: var(--green);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← الرئيسية</a>
  
  <div class="start-screen" id="start-screen">
    <h1>🎮 لعبة Zaki Tool Run 3.0</h1>
    <p class="game-instructions">
      استكشف عالم الذكاء الاصطناعي في مغامرة جانبية مثيرة!<br>
      اقفز بين المنصات (التصنيفات)، اجمع الأدوات،<br>
      افتح الهدايا، واحقق الأرقام القياسية!<br><br>
      <strong>التحكم:</strong> مفاتيح الأسهم ← → للحركة | المسافة للقفز
    </p>
    <button class="start-btn" onclick="startGame()">ابدأ اللعب! 🚀</button>
  </div>
  
  <canvas id="game-canvas"></canvas>
  
  <div class="game-hud" id="game-hud" style="display: none;">
    <div class="hud-item hud-score">
      <span>💎</span>
      <span id="score">0</span>
    </div>
    <div class="hud-item hud-level">
      <span>⭐</span>
      <span id="level">1</span>
    </div>
    <div class="hud-item hud-tools">
      <span>🛠️</span>
      <span id="tools-count">0</span>
    </div>
  </div>
  
  <div class="player" id="player">🤖</div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const player = document.getElementById('player');
    const startScreen = document.getElementById('start-screen');
    const gameHud = document.getElementById('game-hud');
    
    let gameRunning = false;
    let score = 0;
    let level = 1;
    let playerX = 50;
    let velocityY = 0;
    let isJumping = false;
    let keys = {};
    
    const collectibles = [];
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    function startGame() {
      startScreen.style.display = 'none';
      gameHud.style.display = 'flex';
      gameRunning = true;
      
      generateCollectibles();
      updateHud();
      gameLoop();
    }
    
    function generateCollectibles() {
      for (let i = 0; i < 20; i++) {
        collectibles.push({
          x: Math.random() * (window.innerWidth - 100) + 50,
          y: Math.random() * (window.innerHeight - 200) + 100,
          icon: ['⚡', '💎', '⭐', '🔥', '💚'][Math.floor(Math.random() * 5)],
          value: Math.floor(Math.random() * 50) + 10,
          collected: false
        });
      }
    }
    
    function updateHud() {
      document.getElementById('score').textContent = score.toLocaleString();
      document.getElementById('level').textContent = level;
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (e.code === 'Space' && !isJumping && gameRunning) {
        velocityY = -15;
        isJumping = true;
        player.classList.add('jumping');
        setTimeout(() => player.classList.remove('jumping'), 500);
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });
    
    function gameLoop() {
      if (!gameRunning) return;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (keys['ArrowLeft']) playerX -= 5;
      if (keys['ArrowRight']) playerX += 5;
      
      playerX = Math.max(0, Math.min(window.innerWidth - 50, playerX));
      player.style.left = playerX + 'px';
      
      if (isJumping) {
        velocityY += 0.8;
        const currentBottom = parseInt(player.style.bottom || '100');
        player.style.bottom = (currentBottom - velocityY) + 'px';
        
        if (currentBottom <= 100) {
          player.style.bottom = '100px';
          velocityY = 0;
          isJumping = false;
        }
      }
      
      collectibles.forEach((item, i) => {
        if (item.collected) return;
        
        ctx.font = '20px serif';
        ctx.fillText(item.icon, item.x, item.y);
        
        const pRect = player.getBoundingClientRect();
        const distance = Math.sqrt(
          Math.pow(pRect.left + 25 - item.x, 2) + 
          Math.pow(pRect.top + 25 - item.y, 2)
        );
        
        if (distance < 40) {
          item.collected = true;
          score += item.value;
          updateHud();
        }
      });
      
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
