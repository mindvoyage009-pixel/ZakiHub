<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | ZakiHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --green: #00ff88;
      --cyan: #00ccff;
      --pink: #ff6b9d;
      --gold: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: #e0e0ff;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 1.5rem;
      transition: all 0.2s;
    }
    .card:hover {
      border-color: var(--green);
      transform: translateY(-3px);
    }
    .card-label {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 0.5rem;
    }
    .card-value {
      font-size: 2rem;
      font-weight: 800;
    }
    .card-value.green { color: var(--green); }
    .card-value.cyan { color: var(--cyan); }
    .card-value.pink { color: var(--pink); }
    .card-value.gold { color: var(--gold); }
    
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: right;
      padding: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    th {
      opacity: 0.6;
      font-weight: 600;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      color: inherit;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: var(--green);
      color: var(--bg);
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-btn">← الرئيسية</a>
    <h1>📊 لوحة التحكم المحلية</h1>
    
    <div class="grid" id="stats-grid">
      <div class="card">
        <div class="card-label">إجمالي النقاط</div>
        <div class="card-value gold" id="stat-points">0</div>
      </div>
      <div class="card">
        <div class="card-label">المستوى الحالي</div>
        <div class="card-value green" id="stat-level">1</div>
      </div>
      <div class="card">
        <div class="card-label">سلسلة الأيام</div>
        <div class="card-value cyan" id="stat-streak">0</div>
      </div>
      <div class="card">
        <div class="card-label">الأدوات المكتشفة</div>
        <div class="card-value pink" id="stat-tools">0</div>
      </div>
    </div>
    
    <div class="section">
      <h2><span>🏆</span> الإنجازات</h2>
      <div id="achievements-list"></div>
    </div>
    
    <div class="section">
      <h2><span>📈</span> التقدم</h2>
      <div style="margin-bottom: 1rem;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <span>التقدم للمستوى التالي</span>
          <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%; background: linear-gradient(90deg, var(--green), var(--cyan));"></div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <h2><span>💾</span> البيانات المحلية</h2>
      <button onclick="exportData()" style="padding: 0.75rem 1.5rem; background: var(--green); color: var(--bg); border: none; border-radius: 12px; font-family: inherit; font-weight: 700; cursor: pointer; margin-right: 0.5rem;">
        تصدير JSON
      </button>
      <button onclick="clearData()" style="padding: 0.75rem 1.5rem; background: var(--pink); color: white; border: none; border-radius: 12px; font-family: inherit; font-weight: 700; cursor: pointer;">
        مسح البيانات
      </button>
    </div>
  </div>

  <script>
    function loadStats() {
      const dopamine = JSON.parse(localStorage.getItem('zaki-dopamine') || '{}');
      const memory = JSON.parse(localStorage.getItem('zaki-memory') || '{}');
      
      document.getElementById('stat-points').textContent = (dopamine.points || 0).toLocaleString();
      document.getElementById('stat-level').textContent = dopamine.level || 1;
      document.getElementById('stat-streak').textContent = dopamine.streak || 0;
      document.getElementById('stat-tools').textContent = (dopamine.toolsDiscovered || []).length;
      
      // Progress bar
      const points = dopamine.points || 0;
      const level = dopamine.level || 1;
      const nextLevel = level * 500;
      const prevLevel = (level - 1) * 500;
      const progress = Math.min(100, ((points - prevLevel) / (nextLevel - prevLevel)) * 100);
      document.getElementById('progress-fill').style.width = progress + '%';
      document.getElementById('progress-text').textContent = Math.floor(progress) + '%';
      
      // Achievements
      const achievementsList = document.getElementById('achievements-list');
      const unlocked = dopamine.achievements || [];
      
      if (unlocked.length === 0) {
        achievementsList.innerHTML = '<p style="opacity: 0.6;">لا توجد إنجازات بعد. ابدأ الاستكشاف!</p>';
      } else {
        achievementsList.innerHTML = unlocked.map(id => `
          <div style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2); border-radius: 50px; margin: 0.25rem;">
            <span>🏆</span>
            <span>${id}</span>
          </div>
        `).join('');
      }
    }
    
    function exportData() {
      const data = {
        dopamine: JSON.parse(localStorage.getItem('zaki-dopamine') || '{}'),
        memory: JSON.parse(localStorage.getItem('zaki-memory') || '{}'),
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `zakihub-backup-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function clearData() {
      if (confirm('هل أنت متأكد؟ سيتم مسح كل تقدمك!')) {
        localStorage.removeItem('zaki-dopamine');
        localStorage.removeItem('zaki-memory');
        localStorage.removeItem('zaki-points');
        location.reload();
      }
    }
    
    loadStats();
  </script>
</body>
</html>
