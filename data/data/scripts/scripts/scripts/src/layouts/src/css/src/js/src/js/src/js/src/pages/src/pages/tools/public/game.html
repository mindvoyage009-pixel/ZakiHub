<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaki's Tool Run 3.0 🎮 | AI Tools Exploration Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --green: #00ff88;
      --pink: #ff6b9d;
      --cyan: #00ccff;
      --gold: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #e0e0ff;
      overflow: hidden;
      height: 100vh;
    }
    
    #game-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    
    .game-hud {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    
    .hud-item {
      background: rgba(10,10,30,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      pointer-events: all;
    }
    
    .hud-score { color: var(--gold); }
    .hud-level { color: var(--green); }
    .hud-tools { color: var(--cyan); }
    
    .player {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 3rem;
      transition: left 0.1s ease;
      filter: drop-shadow(0 0 10px var(--green));
      cursor: pointer;
    }
    
    .player.jumping {
      animation: jump 0.5s ease;
    }
    
    @keyframes jump {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-100px); }
    }
    
    .zone {
      position: absolute;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--bg);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .zone:hover {
      transform: scale(1.05);
    }
    
    .collectible {
      position: absolute;
      font-size: 1.5rem;
      animation: float 2s ease-in-out infinite;
      cursor: pointer;
      z-index: 4;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .gift-box {
      position: absolute;
      font-size: 2rem;
      animation: glow 1.5s ease-in-out infinite;
      cursor: pointer;
      z-index: 4;
    }
    
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 5px var(--gold)); }
      50% { filter: drop-shadow(0 0 20px var(--gold)); }
    }
    
    .start-screen {
      position: fixed;
      inset: 0;
      background: rgba(5,5,16,0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    
    .start-screen h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3rem;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .start-btn {
      padding: 1rem 3rem;
      font-size: 1.3rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: var(--bg);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .start-btn:hover {
      transform: scale(1.1);
    }
    
    .game-instructions {
      text-align: center;
      opacity: 0.7;
      max-width: 400px;
      line-height: 1.8;
    }
    
    .char-editor {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(10,10,30,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    
    .char-option {
      width: 40px;
      height: 40px;
      font-size: 1.5rem;
      border: 2px solid transparent;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .char-option:hover, .char-option.active {
      border-color: var(--green);
      transform: scale(1.1);
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: var(--green);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <a href="/" class="back-btn">← Home</a>
  
  <div class="start-screen" id="start-screen">
    <h1>🎮 Zaki's Tool Run 3.0</h1>
    <p class="game-instructions">
      Explore the world of AI in a side adventure!<br>
      Jump between platforms (categories), collect tools,<br>
      open gifts, and beat your records!<br><br>
      <strong>Controls:</strong> Arrow keys ← → to move | Space to jump
    </p>
    <button class="start-btn" onclick="startGame()">Start Playing! 🚀</button>
  </div>
  
  <canvas id="game-canvas"></canvas>
  
  <div class="game-hud" id="game-hud" style="display: none;">
    <div class="hud-item hud-score">
      <span>💎</span>
      <span id="score">0</span>
    </div>
    <div class="hud-item hud-level">
      <span>⭐</span>
      <span id="level">1</span>
    </div>
    <div class="hud-item hud-tools">
      <span>🛠️</span>
      <span id="tools-count">0</span>
    </div>
  </div>
  
  <div class="player" id="player">🤖</div>
  
  <div class="char-editor" id="char-editor" style="display: none;">
    <button class="char-option active" onclick="setChar('🤖')">🤖</button>
    <button class="char-option" onclick="setChar('🦊')">🦊</button>
    <button class="char-option" onclick="setChar('🐉')">🐉</button>
    <button class="char-option" onclick="setChar('🦄')">🦄</button>
    <button class="char-option" onclick="setChar('👽')">👽</button>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // ZAKI'S TOOL RUN 3.0 - GAME ENGINE
    // ═══════════════════════════════════════════════════════
    
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const player = document.getElementById('player');
    const startScreen = document.getElementById('start-screen');
    const gameHud = document.getElementById('game-hud');
    const charEditor = document.getElementById('char-editor');
    
    let gameRunning = false;
    let score = 0;
    let level = 1;
    let toolsCollected = [];
    let playerX = 50;
    let playerY = 0;
    let velocityY = 0;
    let isJumping = false;
    let keys = {};
    
    const categories = [
      { name: 'Text', color: '#00ff88', icon: '📝', y: 300 },
      { name: 'Image', color: '#ff6b9d', icon: '🎨', y: 250 },
      { name: 'Code', color: '#00ccff', icon: '💻', y: 200 },
      { name: 'Video', color: '#ffd700', icon: '🎬', y: 350 },
      { name: 'Audio', color: '#b829dd', icon: '🎙️', y: 280 },
      { name: '3D', color: '#ff8c00', icon: '🧊', y: 320 }
    ];
    
    const collectibles = [];
    const gifts = [];
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    function startGame() {
      startScreen.style.display = 'none';
      gameHud.style.display = 'flex';
      charEditor.style.display = 'flex';
      gameRunning = true;
      
      const memory = JSON.parse(localStorage.getItem('zaki-memory') || '{}');
      if (memory.avatar) setChar(memory.avatar);
      
      generateCollectibles();
      generateGifts();
      
      const d = JSON.parse(localStorage.getItem('zaki-dopamine') || '{}');
      score = d.points || 0;
      level = d.level || 1;
      updateHud();
      
      gameLoop();
    }
    
    function generateCollectibles() {
      for (let i = 0; i < 20; i++) {
        collectibles.push({
          x: Math.random() * (window.innerWidth - 100) + 50,
          y: Math.random() * (window.innerHeight - 200) + 100,
          icon: ['⚡', '💎', '⭐', '🔥', '💚'][Math.floor(Math.random() * 5)],
          value: Math.floor(Math.random() * 50) + 10,
          collected: false
        });
      }
    }
    
    function generateGifts() {
      for (let i = 0; i < 5; i++) {
        gifts.push({
          x: Math.random() * (window.innerWidth - 100) + 50,
          y: Math.random() * (window.innerHeight - 200) + 100,
          icon: '🎁',
          value: Math.floor(Math.random() * 200) + 50,
          collected: false,
          from: ['ZakiMaster', 'AI_Explorer', 'CodeNinja'][Math.floor(Math.random() * 3)]
        });
      }
    }
    
    function setChar(char) {
      player.textContent = char;
      document.querySelectorAll('.char-option').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === char);
      });
      
      const memory = JSON.parse(localStorage.getItem('zaki-memory') || '{}');
      memory.avatar = char;
      localStorage.setItem('zaki-memory', JSON.stringify(memory));
    }
    
    function updateHud() {
      document.getElementById('score').textContent = score.toLocaleString();
      document.getElementById('level').textContent = level;
      document.getElementById('tools-count').textContent = toolsCollected.length;
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (e.code === 'Space' && !isJumping && gameRunning) {
        velocityY = -15;
        isJumping = true;
        player.classList.add('jumping');
        setTimeout(() => player.classList.remove('jumping'), 500);
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });
    
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    });
    
    document.addEventListener('touchmove', (e) => {
      const diff = e.touches[0].clientX - touchStartX;
      playerX += diff * 0.5;
      touchStartX = e.touches[0].clientX;
    });
    
    document.addEventListener('touchend', () => {
      if (!isJumping) {
        velocityY = -15;
        isJumping = true;
      }
    });
    
    function gameLoop() {
      if (!gameRunning) return;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      categories.forEach((cat, i) => {
        const x = (i * (canvas.width / categories.length)) + 50;
        const width = canvas.width / categories.length - 100;
        
        ctx.fillStyle = cat.color + '30';
        ctx.fillRect(x, cat.y, width, 20);
        ctx.fillStyle = cat.color;
        ctx.font = 'bold 12px Inter';
        ctx.textAlign = 'center';
        ctx.fillText(cat.icon + ' ' + cat.name, x + width/2, cat.y - 10);
        
        const playerRect = player.getBoundingClientRect();
        if (playerRect.left > x && playerRect.right < x + width &&
            Math.abs(playerRect.bottom - cat.y) < 20 && velocityY >= 0) {
          velocityY = 0;
          isJumping = false;
          player.style.bottom = (canvas.height - cat.y - playerRect.height) + 'px';
        }
      });
      
      if (keys['ArrowLeft']) playerX -= 5;
      if (keys['ArrowRight']) playerX += 5;
      
      playerX = Math.max(0, Math.min(window.innerWidth - 50, playerX));
      player.style.left = playerX + 'px';
      
      if (isJumping) {
        velocityY += 0.8;
        const currentBottom = parseInt(player.style.bottom || '100');
        player.style.bottom = (currentBottom - velocityY) + 'px';
        
        if (currentBottom <= 100) {
          player.style.bottom = '100px';
          velocityY = 0;
          isJumping = false;
        }
      }
      
      collectibles.forEach((item, i) => {
        if (item.collected) return;
        
        ctx.font = '20px serif';
        ctx.fillText(item.icon, item.x, item.y);
        
        const pRect = player.getBoundingClientRect();
        const distance = Math.sqrt(
          Math.pow(pRect.left + 25 - item.x, 2) + 
          Math.pow(pRect.top + 25 - item.y, 2)
        );
        
        if (distance < 40) {
          item.collected = true;
          score += item.value;
          updateHud();
          
          const d = JSON.parse(localStorage.getItem('zaki-dopamine') || '{}');
          d.points = score;
          localStorage.setItem('zaki-dopamine', JSON.stringify(d));
          localStorage.setItem('zaki-points', score);
          
          showGameToast(`+${item.value} points!`);
        }
      });
      
      gifts.forEach((gift, i) => {
        if (gift.collected) return;
        
        ctx.font = '25px serif';
        ctx.fillText(gift.icon, gift.x, gift.y);
        
        const pRect = player.getBoundingClientRect();
        const distance = Math.sqrt(
          Math.pow(pRect.left + 25 - gift.x, 2) + 
          Math.pow(pRect.top + 25 - gift.y, 2)
        );
        
        if (distance < 40) {
          gift.collected = true;
          score += gift.value;
          updateHud();
          showGameToast(`🎁 Gift from ${gift.from}! +${gift.value}`);
          
          const d = JSON.parse(localStorage.getItem('zaki-dopamine') || '{}');
          d.points = score;
          localStorage.setItem('zaki-dopamine', JSON.stringify(d));
          localStorage.setItem('zaki-points', score);
        }
      });
      
      requestAnimationFrame(gameLoop);
    }
    
    function showGameToast(msg) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,255,136,0.9);
        color: #050510;
        padding: 1rem 2rem;
        border-radius: 50px;
        font-weight: 700;
        z-index: 1000;
        animation: fadeInUp 0.3s ease;
      `;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
  </script>
</body>
</html>
